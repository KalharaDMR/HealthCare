apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthcare-frontend
  labels:
    app: healthcare-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: healthcare-frontend
  template:
    metadata:
      labels:
        app: healthcare-frontend
    spec:
      containers:
        - name: healthcare-frontend
          image: healthcare-frontend:latest  # or your image name
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          # No environment variables needed for static frontend